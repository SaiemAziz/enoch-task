name: Deploy React App to IIS

on:
  push:
    branches:
      - main # Trigger on pushes to main

jobs:
  build-and-deploy:
    runs-on: self-hosted # 👈 This tells GitHub to use your IIS machine

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Deploy to IIS
        run: |
          robocopy ".\build" "C:\inetpub\wwwroot\Enoch\Front-end" /MIR /XF DIP.png
